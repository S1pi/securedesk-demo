services:
  postgres:
    image: postgres:16-alpine
    container_name: securedesk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: securedesk
      POSTGRES_PASSWORD: securedesk_dev
      POSTGRES_DB: securedesk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securedesk"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
